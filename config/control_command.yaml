odin1_ros2_driver:
  ros__parameters:
    streamctrl: 1
    sendrgb: 1
    sendimu: 1
    sendodom: 1
    senddtof: 1
    sendcloudslam: 1
    sendcloudrender: 0
    sendrgbcompressed: 1
    sendpath: 1
    senddepth: 0
    recorddata: 0
    custom_map_mode: 1    # 0: Odometry mode 1: SLAM mode 2: Relocalization mode
    use_host_ros_time: 1  # 0: device timestamp, 1: host ROS time, 2: device timestamp with smoothed PTP offset correction
    relocalization_map_abs_path: "/path/to/relocalization/map.bin" # must be set for Relocalization mode or will fail
